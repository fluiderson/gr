# Account Management module ‚Äî example operator configuration.
#
# Reference docs:
#   - DESIGN.md ¬ß3.1 (hierarchy depth defaults), ¬ß3.5 (resource-ownership probe),
#     ¬ß4.3 (fail-closed on missing AuthZ resolver)
#   - PRD.md  (depth-threshold semantics, retention defaults)
#   - features/feature-tenant-hierarchy-management.md (retention + reaper pipelines)
#
# Schema source of truth: cyberware-account-management `crate::config::AccountManagementConfig`.
# The struct is split into sub-sections (`listing`, `hierarchy`, `retention`,
# `reaper`, `idp`) so related knobs travel together. Defaults below match
# `Default::default()` and `validate()` rejects `0` / out-of-range values for
# the load-bearing knobs (see inline notes).
#
# `#[serde(default, deny_unknown_fields)]` is set on every section, so:
#   - every field is OPTIONAL ‚Äî omitted fields fall back to the default shown here
#   - any UNKNOWN field rejects module init (loud misconfig surface)
#
# All durations are integer seconds (no humantime parsing on this module).

# =============================================================================
# Listing ‚Äî pagination clamps for collection endpoints
# =============================================================================
listing:
  # Hard cap on `$top` for `listChildren`; matches OpenAPI `Top.maximum`.
  # `validate()` rejects `0` (would empty every page).
  max_top: 200

# =============================================================================
# Hierarchy ‚Äî depth gating (DESIGN ¬ß3.1 / PRD)
# =============================================================================
hierarchy:
  # false ‚Üí emit advisory log + metric at the threshold and proceed
  # true  ‚Üí reject with `tenant_depth_exceeded` at the same threshold
  depth_strict_mode: false

  # Max parent.depth + 1 admitted by `create_child`. Hard upper bound
  # 1_000_000 (guards the saga's depth arithmetic against silent
  # saturation; `validate()` rejects values above the cap).
  depth_threshold: 10

# =============================================================================
# Retention ‚Äî soft-delete + hard-delete pipeline
# =============================================================================
# Tick + batch values MUST be > 0 ‚Äî `tokio::time::interval` panics on
# zero, and `LIMIT 0` would scan zero rows forever. `validate()`
# rejects each at module init rather than crashing the lifecycle task
# on its first tick.
retention:
  # Hard-delete tick ‚Äî scans rows whose `scheduled_at + retention <= now`
  # and runs the leaf-first cascade.
  tick_secs: 60

  # Default retention window applied at soft-delete time when the
  # caller does not specify one. `0` disables retention (immediate
  # hard-delete eligibility).
  default_window_secs: 7776000   # 90 days

  # Max tenants processed per retention tick.
  hard_delete_batch_size: 64

  # Max parallel hard-delete tasks within a single retention tick.
  # `validate()` rejects 0; the call site additionally clamps `.max(1)`
  # as defense-in-depth for tests that bypass `validate`.
  hard_delete_concurrency: 4

# =============================================================================
# Reaper ‚Äî provisioning-row compensation pipeline
# =============================================================================
reaper:
  # Reaper tick ‚Äî compensates rows stuck in `Provisioning` beyond
  # `provisioning_timeout_secs` (claim + status fence applied).
  tick_secs: 30

  # A `Provisioning` row older than this is reaper-eligible.
  # `validate()` rejects `0` (would make every fresh row instantly
  # reaper-eligible and trigger premature compensation).
  provisioning_timeout_secs: 300

  # Max provisioning rows processed per reaper tick.
  batch_size: 64

# =============================================================================
# IdP ‚Äî external Identity Provider integration policy
# =============================================================================
# `AuthZResolverClient`, `TypesRegistryClient`, `ResourceGroupClient` are
# declared as hard `deps` in `#[modkit::module(...)]` and are ALWAYS
# fail-closed on missing client ‚Äî there is no config knob for them.
# `IdpTenantProvisionerClient` is the only optional plugin.
idp:
  # true  ‚Üí init fails closed when no IdpTenantProvisionerClient is registered
  #         in `ClientHub` (production posture for deployments that integrate
  #         with an external IdP).
  # false ‚Üí fall back to NoopProvisioner; `create_child` returns
  #         `UnsupportedOperation` at runtime if the saga reaches the IdP
  #         step.
  #
  # Default is `false` so dev / test deployments without an IdP plugin keep
  # booting unchanged. Production deployments that need IdP integration MUST
  # set this to `true`.
  required: false
